<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Israel Independence Day Snake</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Yom Ha'atzmaut Snake</h1>
            <div class="scores-row">
                <div class="score-board">
                    <span class="score-label">Score:</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-board">
                    <span class="score-label">Best (<span id="highScoreName">None</span>):</span>
                    <span id="highScore" class="score-value">0</span>
                </div>
            </div>
        </div>

        <div class="main-layout">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div id="gameOverScreen" class="overlay hidden">
                    <h2>Game Over!</h2>
                    <p>Your Score: <span id="finalScore">0</span></p>
                    <p id="newRecordMsg" class="new-record hidden">🏆 New Record!</p>
                    <button id="restartBtn">Play Again</button>
                </div>
                <div id="startScreen" class="overlay">
                    <h2>Ready to play?</h2>
                    <p class="hint-text">Arrow keys / Swipe / D-Pad</p>
                    <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" autocomplete="off">
                    <button id="startBtn">Start Game</button>
                </div>
            </div>

            <div class="leaderboard">
                <h3>🏆 Leaderboard</h3>
                <ol id="leaderboardList">
                    <li class="empty-entry">No scores yet</li>
                </ol>
            </div>
        </div>

        <!-- Mobile D-Pad Controls -->
        <div class="dpad" id="dpad">
            <button class="dpad-btn dpad-up"    id="dpadUp">▲</button>
            <button class="dpad-btn dpad-left"  id="dpadLeft">◀</button>
            <button class="dpad-btn dpad-center" id="dpadCenter">🇮🇱</button>
            <button class="dpad-btn dpad-right" id="dpadRight">▶</button>
            <button class="dpad-btn dpad-down"  id="dpadDown">▼</button>
        </div>

        <div class="controls-hint desktop-only">
            <p>Arrow keys ↑ ↓ ← → to move &nbsp;|&nbsp; Enter to start/restart</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
